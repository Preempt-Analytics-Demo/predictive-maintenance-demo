# .github/workflows/docker-publish.yml
#
# WHY THIS FILE EXISTS
# Every push to main that touches application code needs to produce a fresh
# Docker image so demo users always pull code that matches the repo.
# Without this, source changes sit in git but the running containers still
# use the stale image they downloaded at `docker compose up` time.
#
# WHAT IT DOES
# 1. Triggers on any push to main that touches src/, scripts/, or the
#    Dockerfile itself (ignores README/docs-only changes to save minutes).
# 2. Logs into GitHub Container Registry using the built-in GITHUB_TOKEN
#    (no secrets to configure — GitHub provides it automatically).
# 3. Builds the image and pushes two tags:
#      :latest  — what `docker compose up` pulls by default
#      :<sha>   — a permanent pin for rollbacks and debugging

name: Publish Docker image

on:
  workflow_dispatch:  # allows manual trigger from the Actions tab in GitHub
  push:
    branches:
      - main
    paths:
      # Only rebuild when application code or the image recipe changes.
      # README and workflow-only changes do not need a new image.
      - "src/**"
      - "scripts/**"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    # Grant the job permission to push packages to GHCR and write the
    # Actions cache. actions: write is required by the type=gha cache
    # backend — without it buildx fails when trying to save layer cache.
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      # Full history not needed — fetch depth 1 is faster and sufficient for a
      # Docker build that does not embed git metadata.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Authenticate to GHCR ────────────────────────────────────────────────
      # GITHUB_TOKEN is injected automatically by Actions — no secret setup needed.
      # The registry URL must match the image name prefix in docker-compose.yml.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract metadata ─────────────────────────────────────────────────────
      # docker/metadata-action generates the two tags we want:
      #   ghcr.io/<owner>/<repo>:latest
      #   ghcr.io/<owner>/<repo>:<short-sha>
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # ── Build and push ───────────────────────────────────────────────────────
      # BuildKit cache speeds up repeat builds by reusing unchanged layers.
      # push: true uploads both tags to GHCR in a single step.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # restore cache from previous runs
          cache-to: type=gha,mode=max  # save cache for future runs
