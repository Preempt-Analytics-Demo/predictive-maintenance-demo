# .github/workflows/retrain.yml
#
# Automatically retrain the predictive maintenance model whenever new
# simulation data is merged into main.
#
# WHY THIS FILE EXISTS
# dvc repro is deterministic and environment-sensitive - running it on a
# developer laptop introduces "works on my machine" risk. This workflow
# runs it in a clean, reproducible Ubuntu VM so every retrain uses the
# same Python version, the same dependency versions, and the same data.
#
# WHEN IT RUNS
# The trigger is a push to main that changes data/ai4i2020.csv.dvc.
# That .dvc file is a tiny pointer (a content hash). When export_simulation_to_csv.py
# appends new rows and you run `dvc add data/ai4i2020.csv`, the hash changes.
# Committing and pushing that changed pointer is the signal to CI that
# new training data is ready - no separate webhook or manual trigger needed.
#
# HOW TO READ THIS FILE
# A GitHub Actions workflow has three layers:
#   on:    - WHEN to run (push, schedule, manual button)
#   jobs:  - WHAT to run (a list of named jobs)
#   steps: - HOW to run it (ordered commands inside a job)
#
# Each step either uses: a pre-built Action from the marketplace,
# or run: a shell command you write yourself.

name: Retrain on new data


on:
  push:
    branches:
      - main
    paths:
      - "retrain.trigger"   # only fires when drift-triggered export updates this file
                            # CSV-only pushes (no drift) update ai4i2020.csv.dvc but
                            # leave retrain.trigger unchanged, so no workflow runs.

  workflow_dispatch:


jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Get the code
      # actions/checkout downloads your repository into the VM.
      # Without this, the VM has no files to work with.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Set up Python
      # actions/setup-python installs a specific Python version and caches
      # pip downloads between runs so the second run is faster.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3 - Install dependencies
      # The VM starts empty every run - nothing carries over from a previous run.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Step 4 - Give DVC access to the remote storage
      # DVC stores large files (the training CSV) on DagsHub, not in Git.
      # In local dev, credentials live in .dvc/config.local (gitignored).
      # In CI, we write them from GitHub Secrets at runtime.
      # --local means the credentials are never written to the committed .dvc/config.
      - name: Configure DVC credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      # Step 5 - Download the training data
      # dvc pull reads the .dvc pointer files and downloads the actual CSVs
      # from DagsHub. Without this step the CSV files do not exist in the VM.
      - name: Pull training data from DVC remote
        run: dvc pull data/ai4i2020.csv data/ai4i2020_baseline.csv

      # Step 6 - Run the training pipeline
      # Only the two XGBoost stages are retrained here — these are the model
      # families currently registered under @production. Running all 12 DVC
      # stages on every data push would retrain SVM, MLP, and four other
      # families that are not serving traffic, burning CI minutes for no gain.
      # To re-run the full experiment comparison, trigger the workflow manually
      # and temporarily change this command to `dvc repro`.
      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: dvc repro train_xgb_binary train_xgb_multiclass

      # Step 7 - Promote model to production
      # promote_model.py compares the newly registered version against the
      # current @production version using two gates:
      #   Gate 1 — improvement: new f1_test must beat current @production f1_test
      #   Gate 2 — floor:       new f1_test must meet the minimum threshold
      # Both gates must pass before the alias is moved. If either fails, the
      # step exits 0 (non-blocking) and the old model keeps serving traffic.
      # Review the gate output in the Actions log after each retrain run.
      - name: Promote model to production
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python scripts/promote_model.py \
            --model-name predictive-maintenance-binary \
            --min-f1 0.85 \
            --auto
          python scripts/promote_model.py \
            --model-name predictive-maintenance-multiclass \
            --min-f1 0.80 \
            --auto
